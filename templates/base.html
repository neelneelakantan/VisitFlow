<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "VisitFlow" }}</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: #4a5568;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.4rem;
            font-weight: 600;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        h1, h2, h3 {
            margin-top: 0;
            color: #2d3748;
        }
        a {
            color: #3182ce;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>VisitFlow</header>

    <nav style="background:#e2e8f0; padding:0.5rem 2rem;">
        <a href="/">Dashboard</a> |
        <a href="/companies">Companies</a> |
        <a href="/freenotes">Free Notes</a>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
        <footer style="margin-top: 20px; font-size: 0.8em; color: #666;">
            Generated at {{ now() }}
        </footer>
    </div>
</body>
</html>
