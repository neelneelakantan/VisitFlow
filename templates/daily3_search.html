{% extends "base.html" %}
{% block content %}

<h2>Daily3 Search</h2>

<form method="get" action="/daily3/search">
    <input type="text" name="q" value="{{ q }}" placeholder="Search text, #tag, or /regex/" style="width:60%;">
    <button type="submit">Search</button>
</form>

<hr>

{% if results %}
    <ul>

        {% for r in results %}
            <li>
                <strong>{{ r.date }}</strong><br>
                {% if r.entry.notes %}{{ r.entry.notes }}<br> {% else %} 👇<br>{% endif %}
                <a href="/daily3?date={{ r.date }}">View Day</a>
            </li>
        {% endfor %}

    </ul>
{% else %}
    <p>No matches found.</p>
{% endif %}

{% endblock %}
