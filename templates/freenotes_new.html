{% extends "base.html" %}
{% block content %}

<h1>New Note</h1>

<form action="/freenotes/new" method="post">
    <label for="text"><strong>Note</strong></label><br>
    <textarea id="text" name="text" rows="8" style="width:100%;"></textarea>

    <br><br>
    <button type="submit">Save Note</button>
</form>

<p><a href="/freenotes">← Back to Notes</a></p>

{% endblock %}
