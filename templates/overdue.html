<!DOCTYPE html>
<html>
<head>
    <title>VisitFlow - Overdue</title>
</head>
<body>
    <h1>Overdue Bookmarks</h1>

    <ul>
        {% for b in overdue %}
        <li>
            <strong>{{ b.url }}</strong> — {{ b.cadence }}
            <br>
            Last visited: {{ b.last_visited }}
            <br>
            <form action="/bookmarks/{{ b.id }}/visit" method="post">
                <button type="submit">Visit</button>
            </form>
        </li>
        {% endfor %}
    </ul>

    <a href="/bookmarks/view">Back to All</a>
</body>
</html>
