<!DOCTYPE html>
<html>
<head>
    <title>VisitFlow - Bookmarks</title>
</head>
<body>
    <h1>All Bookmarks</h1>

    <ul>
        {% for b in bookmarks %}
        <li>
            <strong>{{ b.url }}</strong> — {{ b.cadence }}
            <br>
            Last visited: {{ b.last_visited }}
            <br>
            <form action="/bookmarks/{{ b.id }}/visit" method="post">
                <button type="submit">Visit</button>
            </form>
        </li>
        {% endfor %}
    </ul>

    <a href="/bookmarks/overdue/view">View Overdue</a>
</body>
</html>
