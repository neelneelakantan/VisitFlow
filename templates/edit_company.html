{% extends "base.html" %}
{% block content %}

<h2>Edit Company</h2>

<form method="post">
    <label>Name:</label>
    <input type="text" name="name" value="{{ company.name }}" required><br>

    <label>URLs (one per line):</label><br>
    <textarea name="urls" rows="8" style="width:100%">{{ company.urls | join('\n') }}</textarea>

    <br>
    <label>Value:</label>
    <select name="value">
        <option value="high" {% if company.value == "high" %}selected{% endif %}>High</option>
        <option value="medium" {% if company.value == "medium" %}selected{% endif %}>Medium</option>
        <option value="low" {% if company.value == "low" %}selected{% endif %}>Low</option>
    </select><br>

    <p id="cadence-container">
        Cadence (days):
        <input type="number" min="1" name="cadence_days" value="{{ company.cadence_days }}">
    </p>

    {% set freq = company.frequency | lower %}
    <p>Frequency:
    <select name="frequency" id="frequency-select">
        <option value="daily"        {% if freq == "daily" %}selected{% endif %}>Daily</option>
        <option value="weekly"       {% if freq == "weekly" %}selected{% endif %}>Weekly</option>
        <option value="monthly"      {% if freq == "monthly" %}selected{% endif %}>Monthly</option>
        <option value="custom"       {% if freq == "custom" %}selected{% endif %}>Custom</option>
        <option value="specific_date" {% if freq == "specific_date" %}selected{% endif %}>Specific Date</option>
    </select>
    </p>

    <p id="specific-date-container">
        Specific Date:
        <input type="date" name="specific_date" value="{{ company.specific_date or '' }}">
    </p>

    <label>Notes:</label><br>
    <textarea name="notes" rows="4">{{ company.notes }}</textarea><br>

    <button type="submit">Save</button>
</form>

<a href="/companies/{{ company.id }}">Cancel</a>

<script>
function updateVisibility() {
    const freq = document.getElementById("frequency-select").value;

    document.getElementById("specific-date-container").style.display =
        freq === "specific_date" ? "block" : "none";

    document.getElementById("cadence-container").style.display =
        freq === "custom" ? "block" : "none";
}

updateVisibility();
document.getElementById("frequency-select").addEventListener("change", updateVisibility);
</script>

{% endblock %}
