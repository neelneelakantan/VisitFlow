{% extends "base.html" %}

{% block content %}
<h1>New Visit</h1>

<form action="/new" method="post">
    <label for="notes"><strong>Notes</strong></label><br>
    <textarea id="notes" name="notes" rows="8" style="width:100%;"></textarea>

    <br><br>
    <button type="submit" style="
        padding: 0.6rem 1.2rem;
        background: #3182ce;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    ">
        Submit
    </button>
</form>

<p><a href="/timeline">← Back to Timeline</a></p>
{% endblock %}
