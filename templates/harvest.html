{% extends "base.html" %}
{% block content %}

<h2>Company Harvester</h2>

<p>Paste any messy list of companies — comma-separated, line-separated, bullets, anything.</p>
<p class="text-muted small">
    New entries are automatically marked as visited and will appear at the top of the Harvester list.
</p>

<form method="post" action="/companies/harvest">
    <textarea name="raw" rows="12" style="width:100%"></textarea>
    <br><br>
    <button type="submit">Process</button>
</form>

{% endblock %}
